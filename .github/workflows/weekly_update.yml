name: Training Dashboard 

# 1. Triggers (When the script runs)
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 20 * * *' # Runs at 8:00 PM daily

# 2. Permissions (Must be at the top level)
permissions:
  contents: write

# 3. Jobs (The actual tasks)
jobs:
  run-coach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Coach Script
        env:
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
            STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
            STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python coach.py

      - name: Commit and Push Advice
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_advice.txt
          # 'git diff --quiet' checks if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "Update coaching advice"
            git push
          else
            echo "No changes to the coaching advice. Skipping push."
          fi
