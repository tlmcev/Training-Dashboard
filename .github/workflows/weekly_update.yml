name: Training Dashboard 

# 1. Triggers (When the script runs)
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 20 * * *' # Runs at 8:00 PM daily

# 2. Permissions (Must be at the top level)
permissions:
  contents: write

# 3. Jobs (The actual tasks)
jobs:
  run-coach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Coach Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      # This tells GitHub to retry the step up to 3 times
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
             python coach.py && break
             n=$((n+1)) 
             echo "API busy, retrying in 30 seconds... (Attempt $n)"
             sleep 30
          done
          
      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Add BOTH files here
          git add latest_advice.txt README.md
          if ! git diff --cached --quiet; then
            git commit -m "Update coaching advice and workout table"
            git push
          else
            echo "No changes detected. Skipping push."
          fi
